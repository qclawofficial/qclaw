<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QClaw · 空投申领</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #080818;
            color: #e0e0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== 背景动画 ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(107,79,216,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 90%, rgba(233,69,96,0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 主卡片 ===== */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(16,16,38,0.95);
            border: 1px solid rgba(107,79,216,0.25);
            border-radius: 24px;
            padding: 28px 24px 24px;
            width: 100%;
            max-width: 440px;
            box-shadow:
                0 0 0 1px rgba(107,79,216,0.08),
                0 32px 80px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
        }

        /* ===== 顶部标题区 ===== */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 16px rgba(212,175,55,0.35));
        }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #4a4a6a;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ===== TronLink 未安装提示 ===== */
        .tronlink-banner {
            display: none;
            background: rgba(255,180,0,0.08);
            border: 1px solid rgba(255,180,0,0.25);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #ffd060;
            line-height: 1.6;
        }
        .tronlink-banner.show { display: block; }
        .tronlink-banner a { color: #ffd060; font-weight: 600; }

        /* ===== 钱包状态栏 ===== */
        .wallet-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(10,10,28,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }
        .wallet-bar.connected { border-color: rgba(74,222,128,0.3); }

        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #333;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .dot.ok { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .dot.loading {
            background: #facc15;
            animation: pulse-dot 1.2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity:1; transform: scale(1); }
            50% { opacity:0.4; transform: scale(0.7); }
        }

        .addr {
            color: #555;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.3s;
        }
        .addr.ok { color: #4cc9f0; }

        .wallet-btn {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(107,79,216,0.4);
            background: rgba(107,79,216,0.1);
            color: #a78bfa;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .wallet-btn:hover {
            background: rgba(107,79,216,0.25);
            border-color: rgba(107,79,216,0.7);
        }
        .wallet-btn.connected {
            border-color: rgba(74,222,128,0.3);
            color: #4ade80;
            background: rgba(74,222,128,0.08);
        }

        /* ===== 汇率信息 ===== */
        .rates {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .rate-box {
            background: rgba(10,10,28,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px 12px;
        }
        .rate-box .label {
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .rate-box .val {
            font-size: 13px;
            font-weight: 600;
            color: #c4b5fd;
        }
        .rate-box .val.highlight { color: #f87171; }

        /* ===== 倒计时 ===== */
        .countdown-box {
            background: rgba(10,10,28,0.6);
            border: 1px solid rgba(233,69,96,0.15);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
            text-align: center;
        }
        .countdown-box .label {
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .countdown-box .time {
            font-size: 22px;
            font-weight: 800;
            color: #e94560;
            letter-spacing: 3px;
            font-variant-numeric: tabular-nums;
        }

        /* ===== TRX 输入 ===== */
        .input-section { margin-bottom: 14px; }
        .input-section .label {
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .input-row {
            display: flex;
            align-items: center;
            background: rgba(10,10,28,0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .input-row:focus-within { border-color: rgba(107,79,216,0.5); }
        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            outline: none;
            text-align: right;
            -moz-appearance: textfield;
        }
        .input-row input::-webkit-outer-spin-button,
        .input-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .input-row .unit {
            padding: 0 18px;
            font-size: 15px;
            color: #444;
            font-weight: 600;
        }
        .input-hint {
            color: #3a3a5a;
            font-size: 11px;
            margin-top: 6px;
            padding-left: 4px;
        }

        /* ===== 预览 ===== */
        .preview-box {
            background: linear-gradient(135deg,
                rgba(107,79,216,0.12) 0%,
                rgba(233,69,96,0.08) 100%);
            border: 1px solid rgba(107,79,216,0.18);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-box .label { color: #555; font-size: 13px; }
        .preview-box .amount {
            font-size: 28px;
            font-weight: 800;
            color: #e94560;
            font-variant-numeric: tabular-nums;
        }
        .preview-box .token { font-size: 14px; color: #888; margin-left: 4px; }

        /* ===== 领取按钮 ===== */
        .claim-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #c13250);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .claim-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .claim-btn:hover:not(:disabled)::before { opacity: 1; }
        .claim-btn:hover:not(:disabled) {
            box-shadow: 0 8px 30px rgba(233,69,96,0.45);
            transform: translateY(-1px);
        }
        .claim-btn:active:not(:disabled) { transform: translateY(0); }
        .claim-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }
        .claim-btn.done {
            background: linear-gradient(135deg, #16a34a, #15803d);
        }

        /* ===== 状态提示 ===== */
        .status-box {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 12.5px;
            line-height: 1.5;
            display: none;
        }
        .status-box.ok {
            display: block;
            background: rgba(74,222,128,0.08);
            border: 1px solid rgba(74,222,128,0.2);
            color: #4ade80;
        }
        .status-box.err {
            display: block;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            color: #f87171;
        }
        .status-box.loading {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(250,204,21,0.06);
            border: 1px solid rgba(250,204,21,0.15);
            color: #facc15;
        }
        .spin {
            width: 14px; height: 14px;
            border: 2px solid rgba(250,204,21,0.3);
            border-top-color: #facc15;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tx-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #4cc9f0;
            text-decoration: none;
            font-size: 12px;
            margin-top: 6px;
        }
        .tx-link:hover { text-decoration: underline; }

        /* ===== 邀请区 ===== */
        .invite-section {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 18px;
            margin-top: 20px;
            display: none;
        }
        .invite-section.show { display: block; }

        .invite-title {
            text-align: center;
            color: #6b4fd8;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .invite-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .stat-box {
            background: linear-gradient(160deg,
                rgba(107,79,216,0.12) 0%,
                rgba(107,79,216,0.04) 100%);
            border: 1px solid rgba(107,79,216,0.18);
            border-radius: 12px;
            padding: 14px 8px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 32px;
            font-weight: 800;
            color: #a78bfa;
            display: block;
            font-variant-numeric: tabular-nums;
        }
        .stat-box .desc {
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* ===== 邀请链接 ===== */
        .link-box {
            background: rgba(10,10,28,0.6);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .link-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .link-row input {
            flex: 1;
            background: rgba(8,8,20,0.9);
            border: 1px solid rgba(107,79,216,0.2);
            border-radius: 8px;
            padding: 9px 12px;
            color: #9f85f5;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            outline: none;
        }
        .link-row input:focus { border-color: rgba(107,79,216,0.5); }
        .copy-btn {
            padding: 9px 14px;
            background: linear-gradient(135deg, #6b4fd8, #5a3ec8);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            min-width: 64px;
        }
        .copy-btn:hover { box-shadow: 0 4px 16px rgba(107,79,216,0.4); }
        .copy-btn.copied {
            background: linear-gradient(135deg, #16a34a, #15803d);
        }

        .refresh-btn {
            width: 100%;
            padding: 9px;
            background: rgba(10,10,28,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            color: #444;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: rgba(107,79,216,0.08);
            border-color: rgba(107,79,216,0.2);
            color: #888;
        }
        .refresh-btn .spin-sm {
            display: inline-block;
            width: 12px; height: 12px;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-top-color: #6b4fd8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }
    </style>
</head>
<body>
<div class="card">

    <!-- 标题 -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon"><img src="logo.png" alt="QClaw"></div>
            <div class="logo-text">QClaw</div>
        </div>
        <div class="subtitle">空投申领</div>
    </div>

    <!-- TronLink 未安装提示 -->
    <div class="tronlink-banner" id="tronlinkBanner">
        ⚠️ 未检测到 TronLink 插件钱包<br>
        请先 <a href="https://www.tronlink.org/" target="_blank">安装 TronLink</a>，
        或使用 TP 钱包 / TronMask
    </div>

    <!-- 钱包状态 -->
    <div class="wallet-bar" id="walletBar">
        <div class="dot loading" id="dot"></div>
        <span class="addr" id="addrText">正在连接钱包...</span>
        <button class="wallet-btn" id="walletBtn" onclick="connect()">连接</button>
    </div>

    <!-- 汇率 -->
    <div class="rates">
        <div class="rate-box">
            <div class="label">基础汇率</div>
            <div class="val">1 TRX = 4 QClaw</div>
        </div>
        <div class="rate-box">
            <div class="label">额外奖励</div>
            <div class="val highlight">+2 QClaw / TRX</div>
        </div>
    </div>

    <!-- 倒计时 -->
    <div class="countdown-box">
        <div class="label">活动剩余</div>
        <div class="time" id="countdown">--:--:--</div>
    </div>

    <!-- TRX 输入 -->
    <div class="input-section">
        <div class="label">输入 TRX 数量</div>
        <div class="input-row">
            <input type="number" id="trxInput" value="50" min="40" max="400" disabled>
            <span class="unit">TRX</span>
        </div>
        <div class="input-hint">范围：40 – 400 TRX</div>
    </div>

    <!-- 预览 -->
    <div class="preview-box">
        <span class="label">预计获得</span>
        <div>
            <span class="amount" id="previewAmount">300</span>
            <span class="token">QClaw</span>
        </div>
    </div>

    <!-- 领取按钮 -->
    <button class="claim-btn" id="claimBtn" disabled onclick="doClaim()">
        连接钱包后领取
    </button>

    <!-- 状态提示 -->
    <div class="status-box" id="statusBox"></div>

    <!-- 邀请区（连接后显示，领取后激活） -->
    <div class="invite-section" id="inviteSection">
        <div class="invite-title">— 我的邀请 —</div>
        <div class="invite-stats">
            <div class="stat-box">
                <span class="num" id="directCount">0</span>
                <span class="desc">直接邀请</span>
            </div>
            <div class="stat-box">
                <span class="num" id="allCount">0</span>
                <span class="desc">全部层级</span>
            </div>
        </div>
        <div class="link-box">
            <div class="link-row">
                <input type="text" id="refLinkInput" readonly>
                <button class="copy-btn" id="copyBtn" onclick="doCopyLink()">复制</button>
            </div>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
            🔄 刷新统计数据
        </button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb@5.0.0/dist TronWeb.bundle.js"></script>
<script>
// ============================================================
// 配置
// ============================================================
const CONTRACT   = '412ee69124a85ecee19772c71f2cc5614423e18fa5';
const REPO_OWNER = 'qclawofficial';
const REPO_NAME  = 'qclaw';
const PAGE_URL   = 'https://qclawofficial.github.io/qclaw/';
const END_DATE   = new Date('2026-08-17T00:00:00+08:00');
const CLAIMS_DIR = 'claims';

// ============================================================
// 状态
// ============================================================
let tronWeb  = null;
let myAddr   = null;
let myRef    = null;
let claimed  = false;   // 本次会话是否已领取
let refreshing = false;

// ============================================================
// 倒计时
// ============================================================
function updateCountdown() {
    const diff = END_DATE - Date.now();
    const el = document.getElementById('countdown');
    if (diff <= 0) {
        el.textContent = '已结束';
        return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor(diff % 86400000 / 3600000);
    const m = Math.floor(diff % 3600000 / 60000);
    const s = Math.floor(diff % 60000 / 1000);
    if (d > 0) {
        el.textContent = `${d}天 ${pad(h)}:${pad(m)}:${pad(s)}`;
    } else {
        el.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }
}
function pad(n) { return String(n).padStart(2, '0'); }
setInterval(updateCountdown, 1000);
updateCountdown();

// ============================================================
// 状态提示
// ============================================================
function showStatus(type, html) {
    const el = document.getElementById('statusBox');
    el.className = 'status-box ' + type;
    el.innerHTML = html;
    el.style.display = 'block';
}
function clearStatus() {
    document.getElementById('statusBox').style.display = 'none';
}
function showLoading(msg) {
    showStatus('loading', `<div class="spin"></div>${msg}`);
}

// ============================================================
// UI 更新
// ============================================================
function setWalletUI(connected, addr) {
    const bar = document.getElementById('walletBar');
    const dot = document.getElementById('dot');
    const text = document.getElementById('addrText');
    const btn = document.getElementById('walletBtn');
    const trxInput = document.getElementById('trxInput');
    const claimBtn = document.getElementById('claimBtn');
    const section = document.getElementById('inviteSection');

    if (connected) {
        bar.classList.add('connected');
        dot.className = 'dot ok';
        text.className = 'addr ok';
        text.textContent = addr;
        btn.textContent = '已连接';
        btn.classList.add('connected');
        trxInput.disabled = false;
        claimBtn.textContent = '立即领取';
        claimBtn.disabled = false;
        // 只在领取成功后才会填邀请链接
        // 连接时不刷新邀请统计，必须领取后才显示
        section.classList.remove('show');
    } else {
        bar.classList.remove('connected');
        dot.className = 'dot loading';
        text.className = 'addr';
        text.textContent = '未连接钱包';
        btn.textContent = '连接';
        btn.classList.remove('connected');
        trxInput.disabled = true;
        claimBtn.textContent = '连接钱包后领取';
        claimBtn.disabled = true;
        claimed = false;
        claimBtn.classList.remove('done');
        claimBtn.textContent = '立即领取';
        document.getElementById('inviteSection').classList.remove('show');
        clearStatus();
    }
}

// 检查当前钱包是否已领取过（连接后调用）
async function checkAlreadyClaimed(addr) {
    try {
        const r = await ghApi(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CLAIMS_DIR}/${addr}.json`);
        return !!(r && r.content);
    } catch { return false; }
}

// ============================================================
// 复制链接
// ============================================================
async function doCopyLink() {
    const input = document.getElementById('refLinkInput');
    const btn   = document.getElementById('copyBtn');
    try {
        await navigator.clipboard.writeText(input.value);
    } catch {
        input.select();
        document.execCommand('copy');
    }
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => {
        btn.textContent = '复制';
        btn.classList.remove('copied');
    }, 2000);
}

// ============================================================
// GitHub API（只读，无 Token）
// ============================================================
async function ghApi(path) {
    try {
        const r = await fetch('https://api.github.com' + path, {
            headers: { 'Accept': 'application/vnd.github.v3+json', 'User-Agent': 'QClaw-Airdrop' }
        });
        if (!r.ok) return null;
        return r.json();
    } catch { return null; }
}

async function getAllClaims() {
    const files = await ghApi(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CLAIMS_DIR}`);
    if (!files || !Array.isArray(files)) return [];
    const claims = [];
    for (const f of files) {
        if (!f.name.endsWith('.json') || f.name === 'README.json') continue;
        const r = await ghApi(f.path);
        if (r && r.content) {
            try { claims.push(JSON.parse(atob(r.content))); } catch {}
        }
    }
    return claims;
}

async function dispatchClaim(addr, ref) {
    try {
        const r = await fetch(
            `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`,
            {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event_type: 'claim',
                    client_payload: { addr, ref: ref || '无' }
                })
            }
        );
        return r.status === 204 || r.status === 200;
    } catch { return false; }
}

// ============================================================
// 刷新邀请统计
// ============================================================
async function doRefresh() {
    if (!myAddr) return;
    if (refreshing) return;
    if (!claimed) {
        // 未领取成功，不显示邀请区也不调用 GitHub API
        return;
    }
    refreshing = true;

    const dirEl = document.getElementById('directCount');
    const allEl = document.getElementById('allCount');
    const btn   = document.getElementById('refreshBtn');
    const section = document.getElementById('inviteSection');

    dirEl.textContent = '—';
    allEl.textContent = '—';
    btn.innerHTML = '<span class="spin-sm"></span>刷新中...';
    btn.disabled = true;
    section.classList.add('show');

    try {
        const claims = await getAllClaims();
        const claimedSet = new Set(claims.map(c => c.addr));

        // 直接邀请：ref 指向我 且 referrer 自己也领取了
        let direct = 0;
        for (const c of claims) {
            if (c.ref === myAddr && claimedSet.has(myAddr)) direct++;
        }

        // 全部层级：递归向下，只沿已领取链路
        const allSet = new Set();
        function down(addr) {
            for (const c of claims) {
                if (c.ref === addr && claimedSet.has(addr) && !allSet.has(c.addr)) {
                    allSet.add(c.addr);
                    down(c.addr);
                }
            }
        }
        down(myAddr);

        dirEl.textContent = direct;
        allEl.textContent = allSet.size;
    } catch {
        dirEl.textContent = '0';
        allEl.textContent = '0';
    }

    btn.innerHTML = '🔄 刷新统计数据';
    btn.disabled = false;
    refreshing = false;
}

// ============================================================
// 领取流程
// ============================================================
async function doClaim() {
    if (!tronWeb || !myAddr) {
        showStatus('err', '请先连接 TronLink 钱包');
        return;
    }
    if (claimed) {
        showStatus('err', '您已领取过，无需重复操作');
        return;
    }

    const trxVal = parseFloat(document.getElementById('trxInput').value);
    if (isNaN(trxVal) || trxVal < 40 || trxVal > 400) {
        showStatus('err', 'TRX 数量需在 40 – 400 之间');
        return;
    }

    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    btn.textContent = '提交中...';
    clearStatus();
    showLoading('请在 TronLink 钱包中确认交易...');

    try {
        const sun = Math.floor(trxVal * 1e6);

        // 构建交易
        const tx = await tronWeb.transactionBuilder.triggerSmartContract(
            CONTRACT,
            'claimReward()',
            { callValue: sun, feeLimit: 1e8 },
            [],
            tronWeb.address.toHex(myAddr)
        );

        btn.textContent = '签名中...';
        showLoading('请在钱包中签名交易...');

        const signed = await tronWeb.trx.sign(tx.transaction);

        btn.textContent = '上链确认...';
        showLoading('交易已签名，正在提交到链上...');

        const result = await tronWeb.trx.sendRawTransaction(signed);

        if (result.result === true || result === true) {
            claimed = true;
            const txid = result.txid || result;
            const shortId = typeof txid === 'string' ? txid.slice(0, 8) + '...' + txid.slice(-6) : '已提交';

            showStatus('ok', `
                ✅ 领取成功！<br>
                <span style="font-size:11px;color:#888">预计 1-3 分钟到账</span><br>
                <a class="tx-link" href="https://tronscan.org/#/transaction/${txid}" target="_blank">
                    🔍 查看交易记录 →
                </a>
            `);

            btn.textContent = '已领取 ✓';
            btn.classList.add('done');

            // 显示邀请区
            document.getElementById('inviteSection').classList.add('show');
            document.getElementById('trxInput').disabled = true;

            // 触发 GitHub Actions 记录邀请
            await dispatchClaim(myAddr, myRef);
            // 延迟刷新统计，等 workflow 写入完成
            setTimeout(() => doRefresh(), 3000);

        } else {
            throw new Error('链上返回失败');
        }

    } catch (e) {
        const msg = e.message || String(e);
        let hint = '';
        if (msg.includes('denied') || msg.includes('rejected') || msg.includes('User rejected')) {
            hint = '（您取消了交易）';
        } else if (msg.includes('balance') || msg.includes('余额')) {
            hint = '（TRX 余额不足）';
        } else if (msg.includes('timeout') || msg.includes('超时')) {
            hint = '（网络超时，请重试）';
        } else if (msg.includes('400')) {
            hint = '（参数错误）';
        }
        showStatus('err', '领取失败 ' + hint + `<br><span style="font-size:11px;color:#888">${msg.slice(0, 80)}</span>`);
        btn.disabled = false;
        btn.textContent = '立即领取';
    }
}

// ============================================================
// 连接钱包
// ============================================================
async function connect() {
    // 检查 TronLink 是否存在
    const hasTronLink = !!(window.tronLink);
    const hasTronWeb  = !!(window.tronWeb);

    if (!hasTronLink && !hasTronWeb) {
        document.getElementById('tronlinkBanner').classList.add('show');
        showStatus('err', '未检测到 TronLink 钱包，请先安装插件');
        return;
    }

    document.getElementById('tronlinkBanner').classList.remove('show');

    // 尝试请求账号
    if (hasTronLink) {
        try {
            await window.tronLink.request({ method: 'tron_requestAccounts' });
        } catch (e) {
            showStatus('err', '请在 TronLink 中授权允许访问');
            return;
        }
    }

    const tw = window.tronLink?.tronWeb || window.tronWeb;
    if (tw?.defaultAddress?.base58) {
        tronWeb = tw;
        myAddr  = tw.defaultAddress.base58;

        // 解析邀请码
        const params = new URLSearchParams(location.search);
        myRef = params.get('ref');
        if (myRef === myAddr) myRef = null;

        setWalletUI(true, myAddr);

        // 检查是否已领取过：是 → 直接显示邀请区；否 → 隐藏
        showLoading('正在检查领取状态...');
        const hasClaimed = await checkAlreadyClaimed(myAddr);
        clearStatus();
        if (hasClaimed) {
            claimed = true;
            document.getElementById('refLinkInput').value = PAGE_URL + '?ref=' + myAddr;
            const section = document.getElementById('inviteSection');
            section.classList.add('show');
            doRefresh();
        }
    } else {
        showStatus('err', '无法获取钱包地址，请确认 TronLink 已解锁');
    }
}

// ============================================================
// 初始化
// ============================================================
document.getElementById('trxInput').addEventListener('input', function () {
    const v = parseFloat(this.value) || 0;
    document.getElementById('previewAmount').textContent =
        v > 0 ? Math.floor(v * 6).toLocaleString() : '—';
});

// 页面加载时自动尝试连接
window.addEventListener('load', () => {
    setTimeout(connect, 500);
});

// 检测 TronLink 切换账号
if (window.ethereum) {
    window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length === 0) {
            setWalletUI(false);
            tronWeb = null;
            myAddr  = null;
        } else {
            connect();
        }
    });
}
