name: Record Claim

on:
  repository_dispatch:
    types: [claim]

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Record claim
        run: |
          mkdir -p claims
          data='${{ toJson(github.event.client_payload) }}'
          addr=$(echo "$data" | grep -o '"addr":"[^"]*"' | cut -d'"' -f4)
          if [ -n "$addr" ]; then
            echo "$data" > "claims/${addr}.json"
          fi
          
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add claims/
          git diff --quiet && echo "No changes" || git commit -m "Add claim record"
          git push
