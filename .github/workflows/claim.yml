name: Record Claim

on:
  repository_dispatch:
    types: [claim]

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Record claim
        run: |
          mkdir -p claims
          echo '${{ toJson(github.event.client_payload) }}' > "claims/${{ github.event.client_payload.addr }}.json"
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claims/
          git diff --staged --quiet || git commit -m "Add claim ${{ github.event.client_payload.addr }}"
          git push
